<!DOCTYPE html>
<html lang="tr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA & Mobile Fullscreen Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#09090b">
    <!-- GÜVENLİK: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self' https:; frame-ancestors 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <link rel="manifest" href="manifest.json">
    
    <!-- Browser Tab & Shortcut Icons (Updated to Specific Supabase Image) -->
    <link rel="icon" type="image/png" href="https://xbbzwitvlrdwnoushgpf.supabase.co/storage/v1/object/public/Bac_Logo/bac.jpeg">
    <link rel="shortcut icon" type="image/png" href="https://xbbzwitvlrdwnoushgpf.supabase.co/storage/v1/object/public/Bac_Logo/bac.jpeg">
    <link rel="apple-touch-icon" href="https://xbbzwitvlrdwnoushgpf.supabase.co/storage/v1/object/public/Bac_Logo/bac.jpeg">

    <title>BAC Handels - Kurumsal Yönetim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              zinc: {
                850: '#1f1f22',
                900: '#18181b',
                950: '#09090b',
              },
              primary: {
                500: '#6366f1', // Indigo
                600: '#4f46e5',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #09090b; /* Zinc-950 */
        color: #e4e4e7; /* Zinc-200 */
        /* Dynamic Viewport Height for Mobile Browsers */
        height: 100dvh;
        width: 100vw;
        overflow: hidden; /* App-like feel */
        overscroll-behavior: none; /* Prevent elastic scrolling/pull-to-refresh */
        -webkit-user-select: none; /* Prevent text selection */
        user-select: none;
        -webkit-tap-highlight-color: transparent; /* Remove blue tap highlight */
      }
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }
      #root {
        height: 100%;
        width: 100%;
      }
      /* Custom Scrollbar for Dark Theme */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b;
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46;
      }
      .glass-panel {
        background: rgba(24, 24, 27, 0.4);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      /* Safe Area for iPhones */
      .pb-safe {
        padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3",
    "clsx": "https://esm.sh/clsx@^2.1.1",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^2.6.0",
    "motion/react": "https://esm.sh/motion@^12.4.7/react"
  }
}
</script>

</head>

</html>
